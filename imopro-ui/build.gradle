plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

dependencies {
    implementation project(':imopro-application')
    implementation project(':imopro-infra')
    implementation 'org.slf4j:slf4j-api:2.0.16'
    runtimeOnly 'ch.qos.logback:logback-classic:1.5.8'
}

javafx {
    version = '21.0.4'
    modules = [ 'javafx.controls', 'javafx.graphics' ]
}

application {
    mainClass = 'com.imopro.ui.ImoproApp'
}
